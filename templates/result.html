<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body { margin:0; font-family:Arial; display:flex; background:#f4f6f9; }

        .sidebar {
            width:250px;
            background:#1e272e;
            color:white;
            padding:20px;
            height:100vh;
        }

        .main { flex:1; padding:20px; }

        .title { font-size:30px; color:#00a8ff; }

        .cards {
            display:flex;
            gap:20px;
            margin:20px 0;
        }

        .card {
            flex:1;
            padding:20px;
            color:white;
            border-radius:10px;
            text-align:center;
        }

        .blue { background:#00a8ff; }
        .orange { background:#e84118; }
        .green { background:#4cd137; }
        .purple { background:#9c88ff; }

        .section {
            background:white;
            padding:20px;
            margin-top:20px;
            border-radius:10px;
        }

        table {
            width:100%;
            border-collapse:collapse;
        }

        th, td {
            border:1px solid #ddd;
            padding:8px;
            text-align:center;
        }

        th {
            background:#00a8ff;
            color:white;
        }

        .graphs {
            display:flex;
            gap:20px;
            flex-wrap:wrap;
        }

        .graphs img {
            width:300px;
            border-radius:10px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>📁 Upload</h2>

    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file"><br><br>
        <button type="submit">Re-Analyze</button>
    </form>
</div>

<div class="main">

    <div class="title">📊 Dashboard</div>

    <!-- CARDS -->
    <div class="cards">
        <div class="card blue">
            <h2>{{ rows }}</h2>
            <p>Rows</p>
        </div>

        <div class="card orange">
            <h2>{{ cols }}</h2>
            <p>Columns</p>
        </div>

        <div class="card green">
            <h2>{{ total_missing }}</h2>
            <p>Missing</p>
        </div>

        <div class="card purple">
            <h2>{{ duplicates }}</h2>
            <p>Duplicates</p>
        </div>
    </div>

    <!-- PREVIEW -->
    <div class="section">
        <h3>📄 Dataset Preview</h3>
        {{ preview | safe }}
    </div>

    <!-- GRAPH -->
    <div class="section">
        <h3>📈 Graphs</h3>
        <div class="graphs">
            <img src="{{ url_for('static', filename='hist.png') }}">
            <img src="{{ url_for('static', filename='bar.png') }}">
            <img src="{{ url_for('static', filename='heatmap.png') }}">
        </div>
    </div>

    <!-- INSIGHTS -->
    <div class="section">
        <h3>🤖 AI Insights</h3>
        <ul>
        {% for i in insights %}
            <li>{{ i }}</li>
        {% endfor %}
        </ul>
    </div>

</div>

</body>
</html>
