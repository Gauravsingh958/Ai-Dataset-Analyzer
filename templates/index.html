<!DOCTYPE html>
<html>
<head>
    <title>AI Data Analyst</title>

    <style>
        body { margin:0; font-family:Arial; display:flex; background:#f4f6f9; }

        .sidebar {
            width:250px;
            background:#1e272e;
            color:white;
            padding:20px;
            height:100vh;
        }

        .main {
            flex:1;
            padding:40px;
            text-align:center;
        }

        .title {
            font-size:40px;
            color:#00a8ff;
        }

        button {
            background:#00a8ff;
            border:none;
            padding:10px;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>📁 Upload Dataset</h2>

    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required><br><br>
        <button type="submit">Analyze</button>
    </form>
</div>

<div class="main">
    <div class="title">AI Data Analyst 🚀</div>
    <p>Upload dataset to generate insights & dashboard</p>
</div>

</body>
</html>
