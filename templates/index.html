<!DOCTYPE html>
<html>
<head>
    <title>AI Data Analyst</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background: linear-gradient(135deg, #00a8ff, #9c88ff);
            color: white;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            padding: 30px;
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.15);
            border-right: 1px solid rgba(255,255,255,0.2);
        }

        .sidebar h2 {
            margin-bottom: 20px;
        }

        input[type="file"] {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: none;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: white;
            color: #333;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* MAIN */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
        }

        /* ANIMATED TITLE */
        .title {
            font-size: 70px;  
            font-weight: bold;
            animation: colorChange 5s infinite alternate;
        }

        @keyframes colorChange {
            0% { color: #ffffff; }
            25% { color: #ffdd59; }
            50% { color: #00ffcc; }
            75% { color: #ff6b6b; }
            100% { color: #ffffff; }
        }

        .subtitle {
            margin-top: 15px;
            font-size: 18px;
            opacity: 0.9;
        }

        .line {
            width: 120px;
            height: 4px;
            background: white;
            margin: 20px auto;
            border-radius: 10px;
        }

        /* CARD */
        .card {
            margin-top: 40px;
            padding: 25px;
            width: 320px;
            backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>📁 Upload Dataset</h2>

    <form action="/upload" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">Analyze</button>
    </form>
</div>

<!-- MAIN -->
<div class="main">
    <div class="title">AI Data Analyst </div>
    <div class="line"></div>

    <div class="subtitle">
        Upload dataset & get smart insights instantly
    </div>

    <div class="card">
        <h3>📊 Smart Analysis Tool</h3>
        <p>Auto analysis, graphs, insights & outlier detection.</p>
    </div>
</div>

</body>
</html>
