<!DOCTYPE html>
<html>
<head>
    <title>AI Data Analyst</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #00a8ff, #9c88ff);
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.15);
            border-right: 1px solid rgba(255,255,255,0.2);
            padding: 30px;
            color: white;
        }

        .sidebar h2 {
            margin-bottom: 20px;
        }

        input[type="file"] {
            width: 100%;
            margin: 15px 0;
            padding: 8px;
            border-radius: 5px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            background: white;
            color: #333;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* MAIN */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            flex-direction: column;
        }

        .title {
            font-size: 70px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .subtitle {
            margin-top: 15px;
            font-size: 18px;
            opacity: 0.9;
        }

        .underline {
            width: 120px;
            height: 4px;
            background: white;
            margin: 20px auto;
            border-radius: 10px;
        }

        /* CARD */
        .card {
            margin-top: 40px;
            padding: 30px;
            width: 350px;
            backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card h3 {
            margin-bottom: 10px;
        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>📁 Upload Dataset</h2>

    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">Analyze</button>
    </form>
</div>

<!-- MAIN -->
<div class="main">
    <div class="title">AI Data Analyst 🚀</div>
    <div class="underline"></div>
    <div class="subtitle">
        Upload dataset & get instant insights, graphs and reports
    </div>

    <div class="card">
        <h3>📊 Smart Dashboard</h3>
        <p>Auto analysis, visualizations & AI insights in seconds.</p>
    </div>
</div>

</body>
</html>
